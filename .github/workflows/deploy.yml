name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build Astro blog
      - name: Install blog dependencies
        working-directory: blog
        run: npm ci

      - name: Build blog
        working-directory: blog
        run: npm run build

      # Assemble site: portfolio (root) + blog (subdirectory)
      - name: Assemble site
        run: |
          mkdir -p _site
          # Copy portfolio files (everything except blog/, node_modules, _site, .github)
          rsync -a --exclude='blog/' --exclude='node_modules/' --exclude='_site/' --exclude='.github/' --exclude='.git/' . _site/
          # Copy blog build output into /blog/
          cp -r blog/dist/ _site/blog/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
