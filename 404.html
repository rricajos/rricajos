<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página no encontrada — RRicajos</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/fonts.css" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      body {
        font-family: "Poppins", sans-serif;
        background-color: #0a0921;
        color: #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      .avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin-bottom: 1.5rem;
      }
      .code {
        font-size: 4rem;
        font-weight: 600;
        color: #5ba8ff;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: 2rem;
        color: #fff;
        margin-bottom: 0.5rem;
      }
      p {
        color: #b0b0b0;
        margin-bottom: 1.5rem;
        max-width: 400px;
        line-height: 1.6;
      }
      .cta {
        display: inline-block;
        background-color: #007bff;
        color: #fff;
        text-decoration: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        transition: background-color 0.2s ease;
      }
      .cta:hover { background-color: #006ee4; }
      .cta:focus-visible {
        outline: 2px solid #5ba8ff;
        outline-offset: 2px;
      }
      @media (prefers-color-scheme: light) {
        body { background-color: #f5f5f7; color: #1d1d1f; }
        h1 { color: #000; }
        .code { color: #0066d6; }
        p { color: #555; }
        .cta { background-color: #0066d6; }
        .cta:hover { background-color: #005bc4; }
      }
    </style>
  </head>
  <body>
    <img src="avatar.png" alt="RRicajos" class="avatar" width="80" height="80" />
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o ha sido movida. Vuelve al inicio para encontrar lo que necesitas.</p>
    <a href="./" class="cta">Ir al inicio</a>
  </body>
</html>
